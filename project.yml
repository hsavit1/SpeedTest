name: SpeedTest
options:
  bundleIdPrefix: com.speedtest
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  SpeedTest:
    type: application
    platform: macOS
    sources:
      - path: SpeedTest
      - path: SpeedTestShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.speedtest.app
        INFOPLIST_FILE: SpeedTest/Info.plist
        CODE_SIGN_ENTITLEMENTS: SpeedTest/SpeedTest.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        COMBINE_HIDPI_IMAGES: true
    dependencies:
      - target: SpeedTestWidget
        embed: true
        codeSign: true

  SpeedTestWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: SpeedTestWidget
      - path: SpeedTestShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.speedtest.app.widget
        INFOPLIST_FILE: SpeedTestWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: SpeedTestWidget/SpeedTestWidget.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/../Frameworks"
          - "@executable_path/../../../../Frameworks"
